<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldX — Admin Login</title>
    <meta name="description" content="ShieldX Central Security System — Admin Login Portal">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #060b14;
            --card:      rgba(15, 23, 42, 0.85);
            --border:    rgba(99, 179, 237, 0.18);
            --blue:      #3b82f6;
            --cyan:      #06b6d4;
            --purple:    #8b5cf6;
            --red:       #ef4444;
            --green:     #10b981;
            --text:      #f0f6ff;
            --muted:     #64748b;
            --input-bg:  rgba(255,255,255,0.05);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-orbs {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
        }
        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.35;
            animation: drift 8s ease-in-out infinite alternate;
        }
        .orb-1 { width:500px; height:500px; background:radial-gradient(circle,#3b82f6,transparent); top:-100px; left:-100px; animation-delay:0s; }
        .orb-2 { width:400px; height:400px; background:radial-gradient(circle,#8b5cf6,transparent); bottom:-80px; right:-80px; animation-delay:-3s; }
        .orb-3 { width:300px; height:300px; background:radial-gradient(circle,#06b6d4,transparent); top:50%; left:50%; transform:translate(-50%,-50%); animation-delay:-6s; }

        @keyframes drift {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(30px,20px) scale(1.08); }
        }

        /* Grid overlay */
        .grid-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image:
                linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Scan line animation */
        .scanline {
            position: fixed; top: -100%; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(6,182,212,0.6), transparent);
            z-index: 1; pointer-events: none;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { to { top: 110%; } }

        /* Login Card */
        .login-wrap {
            position: relative; z-index: 10;
            width: 100%; max-width: 460px;
            padding: 1rem;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 3rem 2.5rem;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 0 0 1px rgba(59,130,246,0.08),
                0 40px 80px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.08);
            animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes slideUp {
            from { opacity:0; transform:translateY(30px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* Logo */
        .logo-wrap {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-icon {
            width: 72px; height: 72px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #1e3a5f, #0f172a);
            border: 1px solid rgba(59,130,246,0.4);
            border-radius: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
            box-shadow: 0 0 30px rgba(59,130,246,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 30px rgba(59,130,246,0.3), inset 0 1px 0 rgba(255,255,255,0.1); }
            50%      { box-shadow: 0 0 50px rgba(59,130,246,0.6), inset 0 1px 0 rgba(255,255,255,0.1); }
        }

        .logo-title {
            font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo-sub {
            font-size: 0.8rem; color: var(--muted); letter-spacing: 0.15em;
            text-transform: uppercase; margin-top: 0.25rem;
        }

        /* Badge */
        .admin-badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 9999px;
            padding: 0.3rem 0.9rem;
            font-size: 0.75rem; font-weight: 600;
            color: #93c5fd; letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 0.6rem;
        }
        .admin-badge::before {
            content: '';
            width: 6px; height: 6px; border-radius: 50%;
            background: #22d3ee;
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* Form */
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block; font-size: 0.8rem; font-weight: 600;
            color: var(--muted); text-transform: uppercase;
            letter-spacing: 0.06em; margin-bottom: 0.5rem;
        }
        .form-input-wrap {
            position: relative;
        }
        .form-icon {
            position: absolute; left: 1rem; top: 50%;
            transform: translateY(-50%);
            font-size: 1rem; opacity: 0.5;
            pointer-events: none;
        }
        .form-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            color: var(--text);
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
        }
        .form-input:focus {
            border-color: var(--blue);
            background: rgba(59,130,246,0.08);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .form-input::placeholder { color: var(--muted); }

        /* Helper hint */
        .input-hint {
            font-size: 0.72rem; color: rgba(99,179,237,0.6);
            margin-top: 0.35rem; margin-left: 0.25rem;
        }

        /* Error */
        .error-box {
            display: none;
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: #fca5a5; font-size: 0.85rem;
            margin-bottom: 1rem;
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)}
        }

        /* Submit */
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            border: none; border-radius: 0.75rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white; font-size: 1rem; font-weight: 700;
            cursor: pointer; letter-spacing: 0.02em;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 8px 20px rgba(59,130,246,0.35);
            position: relative; overflow: hidden;
            margin-top: 0.5rem;
        }
        .btn-login::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(59,130,246,0.5); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-login .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 1.75rem;
            color: var(--muted); font-size: 0.75rem;
        }
        .status-dot { display: inline-block; width:6px; height:6px; border-radius:50%; background:var(--green); margin-right:0.3rem; animation: blink 2s ease-in-out infinite; }
    </style>
</head>
<body>

<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<div class="login-wrap">
    <div class="login-card">
        <!-- Logo -->
        <div class="logo-wrap">
            <div class="logo-icon">🛡️</div>
            <div class="logo-title">ShieldX</div>
            <div class="logo-sub">Central Security Command</div>
            <div class="admin-badge">Admin Portal</div>
        </div>

        <!-- Error Box -->
        <div class="error-box" id="errorBox">⚠ &nbsp;<span id="errorMsg">Invalid credentials</span></div>

        <!-- Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="adminEmail">Admin Email</label>
                <div class="form-input-wrap">
                    <span class="form-icon">👤</span>
                    <input
                        class="form-input"
                        type="email"
                        id="adminEmail"
                        name="email"
                        value="admin@shieldx.local"
                        placeholder="admin@shieldx.local"
                        required
                        autocomplete="username"
                    >
                </div>
                <div class="input-hint">Admin ID: 1000 &nbsp;|&nbsp; email: admin@shieldx.local</div>
            </div>

            <div class="form-group">
                <label class="form-label" for="adminPassword">Password</label>
                <div class="form-input-wrap">
                    <span class="form-icon">🔑</span>
                    <input
                        class="form-input"
                        type="password"
                        id="adminPassword"
                        name="password"
                        value="123"
                        placeholder="Enter password"
                        required
                        autocomplete="current-password"
                    >
                </div>
            </div>

            <button class="btn-login" type="submit" id="loginBtn">
                <span id="btnText">Sign In to Dashboard</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
        </form>

        <div class="login-footer">
            <span class="status-dot"></span>
            Server connected &nbsp;·&nbsp; ShieldX v2.0 &nbsp;·&nbsp; Secure Channel
        </div>
    </div>
</div>

<script>
    const API = "http://127.0.0.1:8000";

    async function handleLogin(e) {
        e.preventDefault();
        const email    = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;
        const errorBox = document.getElementById('errorBox');
        const btn      = document.getElementById('loginBtn');
        const btnText  = document.getElementById('btnText');
        const spinner  = document.getElementById('btnSpinner');

        // Hide error, show spinner
        errorBox.style.display = 'none';
        btn.disabled = true;
        btnText.style.display = 'none';
        spinner.style.display = 'block';

        try {
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.detail || 'Login failed');
            }

            if (data.user && data.user.role !== 'admin') {
                throw new Error('Access denied. Admin privileges required.');
            }

            // Store token + user info
            localStorage.setItem('shieldx_token', data.access_token);
            localStorage.setItem('shieldx_user', JSON.stringify(data.user));

            // Redirect to dashboard
            btnText.textContent = 'Redirecting...';
            btnText.style.display = 'block';
            spinner.style.display = 'none';

            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 600);

        } catch (err) {
            errorBox.style.display = 'block';
            document.getElementById('errorMsg').textContent = err.message;
            btn.disabled = false;
            btnText.style.display = 'block';
            spinner.style.display = 'none';
        }
    }

    // If already logged in, go straight to dashboard
    const token = localStorage.getItem('shieldx_token');
    if (token) {
        window.location.href = '/dashboard';
    }
</script>

</body>
</html>
